<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Read the Road to Machine Learning curriculum on Nabid In Motion." />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>Study · Nabid In Motion</title>
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/brand.css" />
  <link rel="stylesheet" href="css/reader.css" />
</head>
<body class="reader-page">
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <header class="site-header reader-header">
    <div class="container nav">
      <a class="brand-lockup" href="index.html">
        <img src="assets/logo.png" alt="Nabid In Motion" width="44" height="44" />
        <span class="brand-name">Nabid <span>In Motion</span></span>
      </a>
      <div class="reader-header-meta">
        <div class="reader-progress-wrap" id="reader-progress-wrap" hidden>
          <span class="reader-progress-label" id="reader-progress-label">0% read</span>
          <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-bar-fill" id="reader-progress-fill"></div>
          </div>
        </div>
        <button type="button" class="sidebar-toggle btn btn-ghost" id="sidebar-toggle" aria-expanded="false" aria-controls="reader-sidebar">Menu ::</button>
      </div>
    </div>
  </header>

  <div class="reader-shell">
    <aside class="reader-sidebar" id="reader-sidebar" aria-label="Curriculum navigation">
      <div class="sidebar-section sidebar-search-section">
        <label class="sidebar-search-label" for="sidebar-search">Search lessons</label>
        <input type="search" class="sidebar-search-input" id="sidebar-search" placeholder="Search curriculum…" autocomplete="off" spellcheck="false" />
        <div class="sidebar-search-results" id="sidebar-search-results" hidden></div>
      </div>
      <div class="sidebar-section">
        <div class="prompt">:: Guides</div>
        <nav class="sidebar-nav" id="sidebar-guides"></nav>
      </div>
      <div class="sidebar-section">
        <div class="prompt">:: Modules</div>
        <nav class="sidebar-nav sidebar-modules" id="sidebar-modules"></nav>
      </div>
    </aside>

    <main class="reader-main" id="reader-main">
      <div class="reader-toolbar">
        <nav class="reader-breadcrumb" id="reader-breadcrumb" aria-label="Breadcrumb"></nav>
        <div class="reader-actions">
          <div class="confidence-checkin" id="confidence-checkin" hidden>
            <span class="confidence-label">How confident?</span>
            <div class="confidence-buttons" role="group" aria-label="Confidence check-in">
              <button type="button" class="confidence-btn" data-confidence="0" aria-pressed="false">Not yet</button>
              <button type="button" class="confidence-btn" data-confidence="1" aria-pressed="false">Partly</button>
              <button type="button" class="confidence-btn" data-confidence="2" aria-pressed="false">Yes</button>
              <button type="button" class="confidence-btn confidence-btn-clear" data-confidence="" aria-pressed="false" title="Clear">×</button>
            </div>
          </div>
          <label class="mark-read">
            <input type="checkbox" id="mark-read" />
            <span>Mark as read</span>
          </label>
          <a class="btn btn-ghost btn-sm" id="github-source" href="#" target="_blank" rel="noopener noreferrer">GitHub ::</a>
        </div>
      </div>
      <article class="reader-content prose" id="reader-content">
        <p class="reader-loading">Loading lesson…</p>
      </article>
      <nav class="reader-pager" id="reader-pager" aria-label="Lesson navigation"></nav>
      <aside class="lesson-legal" id="lesson-legal" hidden></aside>
    </main>
  </div>

  <footer class="site-footer reader-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="footer-year"></span> Nabid In Motion. Progress saved on your device only.</p>
      <ul class="footer-links">
        <li><a href="index.html">Study Hub</a></li>
        <li><button type="button" class="link-btn" id="export-progress">Export progress</button></li>
        <li><button type="button" class="link-btn" id="import-progress">Import progress</button></li>
        <li><button type="button" class="link-btn" id="reset-progress">Reset progress</button></li>
        <li><a href="nutzungsbedingungen.html">Terms</a></li>
        <li><a href="datenschutz.html">Datenschutz</a></li>
      </ul>
    </div>
    <div class="container content-stamp-wrap" id="content-stamp"></div>
  </footer>

  <script type="module">
    import { initSiteMeta } from "./js/site-meta.js";
    initSiteMeta();
  </script>
  <script src="js/reader.js" type="module"></script>
</body>
</html>
