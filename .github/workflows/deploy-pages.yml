# Deploy subscriber-site/ to GitHub Pages (https://nabidinmotion.github.io)
#
# Setup (one time, on NabidInMotion/nabidinmotion.github.io):
#   Settings → Pages → Build and deployment → Source: Deploy from branch
#   Branch: gh-pages / / (root) → Save
#
# Triggers:
#   - Push to main that touches subscriber-site/
#   - After "Sync curriculum" completes (content rebuild)
#   - Manual: Actions → Deploy Study Hub → Run workflow

name: Deploy Study Hub

on:
  push:
    branches: [main]
    paths:
      - "subscriber-site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Sync curriculum"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          site_dir=$(mktemp -d)
          cp -a subscriber-site/. "$site_dir/"
          touch "$site_dir/.nojekyll"

          cd "$site_dir"
          git init -b gh-pages
          git add -A
          git commit -m "Deploy Study Hub (${GITHUB_SHA::7})"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
