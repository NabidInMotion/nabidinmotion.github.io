# Deploy subscriber-site/ to GitHub Pages (https://nabidinmotion.github.io)
#
# REQUIRED — one-time repo settings (or deploy fails with "only allowed from gh-pages"):
#   1. Settings → Pages → Build and deployment → Source: GitHub Actions
#      (NOT "Deploy from a branch" / gh-pages)
#   2. Settings → Actions → General → Workflow permissions → Read and write
#
# If you see: "Invalid deployment branch … Deployments are only allowed from gh-pages"
# → Pages source is still on gh-pages branch mode. Switch to GitHub Actions (step 1).
#
# Triggers:
#   - Push to main that touches subscriber-site/
#   - After "Sync curriculum" completes (content rebuild)
#   - Manual: Actions → Deploy Study Hub → Run workflow
#
# Scale / abuse: static site — see subscriber-site/docs/SCALE.md.
# GitHub Pages does not apply _headers; use Cloudflare (or similar) in front
# of the custom domain for WAF + cache rules at 100k+ concurrent readers.

name: Deploy Study Hub

on:
  push:
    branches: [main]
    paths:
      - "subscriber-site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Sync curriculum"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          test -f subscriber-site/index.html
          touch subscriber-site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: subscriber-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
