# Deploy subscriber-site/ to GitHub Pages (https://nabidinmotion.github.io)
#
# Setup (one time, on NabidInMotion/nabidinmotion.github.io):
#   1. Settings → Actions → General → Workflow permissions → Read and write
#   2. Settings → Pages → Source: Deploy from branch → gh-pages / / (root) → Save
#
# Triggers:
#   - Push to main that touches subscriber-site/
#   - After "Sync curriculum" completes (content rebuild)
#   - Manual: Actions → Deploy Study Hub → Run workflow

name: Deploy Study Hub

on:
  push:
    branches: [main]
    paths:
      - "subscriber-site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Sync curriculum"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare static site
        run: |
          test -f subscriber-site/index.html
          touch subscriber-site/.nojekyll

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: subscriber-site
          clean: true
          single-commit: true
          commit-message: "Deploy Study Hub (${{ github.sha }})."
