# Deploy subscriber-site/ to GitHub Pages (https://nabidinmotion.github.io)
#
# Setup (one time, on NabidInMotion/nabidinmotion.github.io):
#   1. Settings → Actions → General → Workflow permissions → Read and write
#   2. Settings → Pages → Source: GitHub Actions
#   3. Actions → Deploy Study Hub → Run workflow
#
# Triggers:
#   - Push to main that touches subscriber-site/
#   - After "Sync curriculum" completes (content rebuild)
#   - Manual: Actions → Deploy Study Hub → Run workflow

name: Deploy Study Hub

on:
  push:
    branches: [main]
    paths:
      - "subscriber-site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Sync curriculum"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: touch subscriber-site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: subscriber-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
